name: Bug report
description: Report a problem with pcloud-client
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. **Do not paste real
        access tokens, client secrets, or redirect URLs containing OAuth codes.**
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `pcloud-client upload ...`, the request fails with ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code to reproduce the issue.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pcloud-client version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: e.g. 3.12.1
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14.5, Ubuntu 22.04
    validations:
      required: true
  - type: dropdown
    id: api-host
    attributes:
      label: pCloud API host
      options:
        - api.pcloud.com (US)
        - eapi.pcloud.com (EU)
        - other
    validations:
      required: true
